<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Spam Comment Filter</title>
    <script type="module" src="/src/popup/popup.ts"></script>
  </head>
  <body>
    <main class="popup">
      <header>
        <p class="eyebrow">YouTube</p>
        <h1>Spam Comment Filter</h1>
      </header>

      <section class="controls" aria-label="Filter controls">
        <label class="toggle-row">
          <span>
            <strong>필터 사용</strong>
            <small>스팸으로 보이는 댓글 숨김</small>
          </span>
          <input id="enabled" type="checkbox" />
        </label>

        <label class="toggle-row">
          <span>
            <strong>숨긴 댓글 표시</strong>
            <small>숨기지 않고 흐리게 표시</small>
          </span>
          <input id="showHidden" type="checkbox" />
        </label>
      </section>

      <section class="stats" aria-label="Filter stats">
        <div>
          <span id="hiddenCount">0</span>
          <small>숨긴 댓글</small>
        </div>
        <div>
          <span id="scannedCount">0</span>
          <small>검사한 댓글</small>
        </div>
      </section>

      <section class="learning" aria-label="Learning stats">
        <header>
          <h2>로컬 학습</h2>
          <button id="clearLearning" type="button">초기화</button>
        </header>
        <dl>
          <div>
            <dt>피드백</dt>
            <dd id="totalFeedback">0</dd>
          </div>
          <div>
            <dt>스팸</dt>
            <dd id="spamFeedback">0</dd>
          </div>
          <div>
            <dt>정상</dt>
            <dd id="notSpamFeedback">0</dd>
          </div>
        </dl>
      </section>

      <p id="status" class="status">YouTube 영상 페이지에서 댓글 영역을 열어주세요.</p>
    </main>
  </body>
</html>
